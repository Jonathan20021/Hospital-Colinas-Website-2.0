<!DOCTYPE html>
<html lang="es-DO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sin conexión · Portal del Paciente</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#262161">
  <link rel="icon" type="image/png" href="icons/favicon-32.png">
  <style>
    :root{
      --brand:#262161; --brand-2:#3b327f; --green:#5da334;
      --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --surface:#ffffff;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(1200px 600px at 12% -8%, #eceaf7 0%, rgba(236,234,247,0) 55%),
        radial-gradient(1000px 520px at 108% 14%, #e9f5e1 0%, rgba(233,245,225,0) 50%),
        #f8fafc;
      min-height:100dvh;
      display:grid;
      place-items:center;
      padding:24px;
      padding-top:max(24px, env(safe-area-inset-top));
      padding-bottom:max(24px, env(safe-area-inset-bottom));
    }
    .card{
      width:100%; max-width:440px; text-align:center;
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:24px;
      padding:40px 30px 34px;
      box-shadow:0 30px 60px -28px rgba(38,33,97,.32), 0 8px 24px -16px rgba(15,23,42,.18);
    }
    .logo{width:84px;height:84px;margin:0 auto 22px;display:block;border-radius:22px;
      box-shadow:0 14px 28px -14px rgba(38,33,97,.45)}
    .badge{
      position:relative; width:84px; height:84px; margin:0 auto 22px;
      display:grid; place-items:center; border-radius:50%;
      background:linear-gradient(135deg,#eceaf7,#e9f5e1);
      color:var(--brand);
    }
    .badge svg{width:40px;height:40px}
    .badge::after{
      content:""; position:absolute; inset:-8px; border-radius:50%;
      border:2px dashed #c8c3e6; opacity:.6; animation:spin 18s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    h1{margin:0 0 8px; font-size:1.5rem; letter-spacing:-.02em; color:var(--brand)}
    p{margin:0 auto 8px; max-width:34ch; color:var(--muted); line-height:1.6; font-size:1rem}
    .actions{margin-top:22px; display:flex; flex-direction:column; gap:10px}
    .btn{
      appearance:none; border:0; cursor:pointer; font:inherit; font-weight:700;
      padding:.95rem 1.2rem; border-radius:14px; display:inline-flex; gap:8px;
      align-items:center; justify-content:center; transition:transform .14s, box-shadow .16s, filter .16s;
      text-decoration:none; min-height:52px;
    }
    .btn:active{transform:translateY(1px)}
    .btn-primary{background:linear-gradient(120deg,var(--green),#4e8c2b); color:#fff;
      box-shadow:0 14px 26px -14px rgba(93,163,52,.7)}
    .btn-primary:hover{filter:brightness(1.04)}
    .btn svg{width:19px;height:19px}
    .status{
      margin-top:20px; display:inline-flex; align-items:center; gap:8px;
      font-size:.85rem; color:var(--muted);
      padding:8px 14px; border-radius:999px; background:#f1f5f9; border:1px solid var(--line);
    }
    .dot{width:9px;height:9px;border-radius:50%;background:#ef4444;box-shadow:0 0 0 4px rgba(239,68,68,.14)}
    .dot.on{background:var(--green);box-shadow:0 0 0 4px rgba(93,163,52,.18)}
    .note{margin-top:18px; font-size:.82rem; color:#94a3b8; line-height:1.55}
    .note strong{color:#64748b; font-weight:700}
  </style>
</head>
<body>
  <main class="card" role="main">
    <img class="logo" src="icons/icon-192.png" alt="Hospital General Las Colinas"
         onerror="this.style.display='none'">
    <div class="badge" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h.01"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/>
        <path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/>
        <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/><path d="M5 13a10 10 0 0 1 5.24-2.76"/>
        <line x1="2" y1="2" x2="22" y2="22"/>
      </svg>
    </div>
    <h1>Sin conexión</h1>
    <p>No pudimos conectar con el Portal del Paciente. Revisa tu conexión a internet e inténtalo de nuevo.</p>
    <div class="actions">
      <button class="btn btn-primary" type="button" onclick="location.reload()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9 9 0 0 0-6.36 2.64L3 8"/><path d="M3 3v5h5"/></svg>
        Reintentar
      </button>
    </div>
    <div class="status" id="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">Esperando conexión…</span>
    </div>
    <p class="note">Por tu privacidad, el portal <strong>no guarda tu información médica
      en este dispositivo</strong>. Cada sesión usa una conexión segura.</p>
  </main>
  <script>
    (function () {
      var dot = document.getElementById('dot');
      var txt = document.getElementById('statusText');
      function sync() {
        if (navigator.onLine) {
          dot.classList.add('on');
          txt.textContent = 'Conexión restablecida · recargando…';
          setTimeout(function () { location.reload(); }, 700);
        } else {
          dot.classList.remove('on');
          txt.textContent = 'Sin conexión a internet';
        }
      }
      window.addEventListener('online', sync);
      window.addEventListener('offline', sync);
      sync();
    })();
  </script>
</body>
</html>
